# Gmail Labeler: Python 3.11 + Node.js environment
[phases.setup]
nixPkgs = ["python311", "python311Packages.pip", "nodejs_20"]

[variables]
PIP_BREAK_SYSTEM_PACKAGES = "1"

[phases.install]
cmds = ["npm install", "pip install -r requirements.txt"]

[start]
cmd = "npm run mcp:standalone -- --transport=sse"
